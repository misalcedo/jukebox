name: Tests

on:
  pull_request:
  workflow_dispatch: {}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.8.2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libasound2-dev libpcsclite-dev
      - name: Test
        run: cargo test
